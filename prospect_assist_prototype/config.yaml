# ============================================================================
# Prospect Assist AI — deployment & risk-policy configuration
# ----------------------------------------------------------------------------
# This file is the contract between engineering and the bank's risk team.
# Risk policy (gates, product terms, trust rules) changes here — no deployment.
# ============================================================================

deployment:
  profile: demo            # demo | onprem | aws  (drives logging/storage adapters)

data_source:
  provider: synthetic      # synthetic | csv_batch | aa_fiu
  # csv_batch:  path to normalized ReBIT-shaped JSON/CSV drops from bank DWH
  # aa_fiu:     licensed Account Aggregator client (Setu/Finvu/OneMoney) — needs FIU creds
  cohort_size: 240
  seed: 42

categorizer:
  provider: rules          # rules | llm  (llm = on-prem/Bedrock narration model, Phase 2)
  # Rule order matters: first match wins.
  rules:
    - [SALARY,          'NEFT-SAL|SALARY|SAL-']
    - [EMI,             'ACH-EMI|NACH.*EMI|EMI-']
    - [SIP_INVEST,      'SIP|MUTUALFUND|GROWWMF|ZERODHA']
    - [RENT,            'RENT|LANDLORD|HOUSEOWNER|PG ']
    - [PROPERTY_TAX,    'PROPERTYTAX|PROPERTY TAX']
    - [UTILITY,         'BBPS|ELECTRICITY|POSTPAID|RECHARGE|BROADBAND|GAS']
    - [GIG_INCOME,      'UBER INDIA|ZOMATO PARTNER|SWIGGY DELIVERY|URBANCLAP|PAYOUT']
    - [BUSINESS_INCOME, 'CLIENT|INV-\d|GPAY BUSINESS']
    - [SELF_TRANSFER,   'IMPS-TRANSFER (FROM|TO)']
    - [INTEREST,        'INT\.PD|INTEREST']
    - [COMMUTE,         'OLACABS|UBER TRIP|RAPIDO']
    - [FUEL,            'HPCL|INDIANOIL|IOCL|SHELL|PETROL|FUELSTN']
    - [ECOM_FOOD,       'SWIGGY|ZOMATO|AMAZON|FLIPKART|BIGBASKET|MYNTRA|JIOMART']
    - [CASH,            'ATM|CASH']

model:
  type: logistic           # logistic | gbm   (champion / challenger)
  test_size: 0.3
  split_seed: 7
  registry_dir: models     # trained weights + metadata saved here (joblib + json)

policy:                    # ← owned by the bank's RISK TEAM, not engineering
  foir_ceiling: 0.45       # total EMIs must stay under this share of income
  min_income: 20000        # ₹/month floor for lead eligibility
  products:
    home: {rate: 0.085, tenor_months: 240, cap: 15000000, label: "Home Loan"}
    pl:   {rate: 0.115, tenor_months: 60,  cap: 1500000,  label: "Personal Loan"}
    auto: {rate: 0.095, tenor_months: 84,  cap: 2500000,  label: "Auto Loan"}
    lap:  {rate: 0.105, tenor_months: 180, cap: 10000000, label: "Mortgage / LAP"}

trust:                     # Hunter-style prospect-stage anomaly screen
  enabled: true
  high_penalty: 40         # trust score = 100 − Σ penalties
  medium_penalty: 15
  rules:
    circular_transfers: true
    round_figure_credits: true
    holiday_salary: true
    balance_tally: true
    cash_heavy: true

output:
  lead_feed_format: json   # json | csv | crm  (shape of the aggregated lead feed)
  top_fraction: 0.2        # top share of eligible leads pushed to the call list
